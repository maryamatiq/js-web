<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM|practice</title>
</head>
<body style="background-color:black;color:white;">
    
</body>
<script>
    //create element
    const div=document.createElement('div')
    console.log(div);
    div.className='main'
    div.id=Math.random()*10
    div.setAttribute("title","Maryam")
    div.style.backgroundColor='red'
    //two ways
    // div.innerText='code and icecream'
    const addtext=document.createTextNode('code and icecream')
    div.appendChild(addtext)

//how to attach element in document

document.body.appendChild(div)

</script>
</html>
